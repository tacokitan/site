baseURL = "https://tacokitan.com"
languageCode = "en"
defaultContentLanguage = "en"
title = "tacokitan"
theme = "KeepIt"
themesDir = "/themes/keepit"

paginate = 12
enableEmoji = true
enableRobotsTXT = true
